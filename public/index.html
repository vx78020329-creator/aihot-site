<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>全球热点 — AIHOT</title>
  <meta name="description" content="全球热点资讯实时聚合，站内直接阅读">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/style.css">
  <script>
    (function(){
      try {
        var saved = localStorage.getItem('theme-mode');
        var mode = (saved === 'dark' || saved === 'light' || saved === 'auto') ? saved : 'dark';
        var actual = mode;
        if (mode === 'auto') actual = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', actual);
        document.documentElement.setAttribute('data-theme-mode', mode);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <!-- 移动端侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-logo"><span class="brand-ai">Global</span><span class="brand-hot">HOT</span></span>
    </div>
    <nav class="side-nav">
      <a class="side-link active" data-page="curated" href="#/">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span>精选</span>
      </a>
      <a class="side-link" data-page="all" href="#/all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>全部动态</span>
      </a>
      <a class="side-link" data-page="hot" href="#/hot">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 8v4l3 3"/></svg>
        <span>热门</span>
      </a>
      <div class="side-divider"></div>
      <div class="side-label">分类</div>
      <div id="category-nav"></div>
    </nav>
    <div class="sidebar-footer">
      <div class="theme-switcher">
        <button class="theme-btn" data-mode="dark" title="暗色">🌙</button>
        <button class="theme-btn" data-mode="light" title="亮色">☀️</button>
        <button class="theme-btn" data-mode="auto" title="跟随系统">💻</button>
      </div>
      <div class="sidebar-stats" id="stats-info"></div>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main-content" id="main-content">
    <header class="top-bar">
      <button class="menu-toggle" id="menu-toggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="搜索热点..." />
      </div>
      <div class="top-right">
        <span class="ws-status" id="ws-status" title="实时连接">●</span>
        <button class="btn-collect" id="btn-collect" title="手动采集">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          刷新
        </button>
      </div>
    </header>
    <div class="content-area" id="content-area">
      <div class="loading"><div class="spinner"></div>加载中...</div>
    </div>
  </main>

  <!-- 详情页遮罩 -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <button class="detail-back" id="detail-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          返回
        </button>
        <div class="detail-actions">
          <button class="btn-share" id="btn-share" title="分享">分享</button>
          <a class="detail-ext-link" id="detail-ext-link" href="#" target="_blank" rel="noopener">原文 ↗</a>
        </div>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
